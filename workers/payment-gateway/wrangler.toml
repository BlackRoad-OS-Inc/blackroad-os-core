name = "blackroad-payment-gateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

[env.production]
name = "blackroad-payment-gateway"
routes = [
  { pattern = "pay.blackroad.io/*", zone_name = "blackroad.io" },
  { pattern = "payments.blackroad.io/*", zone_name = "blackroad.io" }
]

# KV Namespaces
kv_namespaces = [
  { binding = "SUBSCRIPTIONS_KV", id = "0cf493d5d19141df8912e3dc2df10464" },
  { binding = "USERS_KV", id = "67a82ad7824d4b89809e7ae2221aba66" }
]

# D1 Database
[[d1_databases]]
binding = "REVENUE_D1"
database_name = "blackroad_revenue"
database_id = "8744905a-cf6c-4e16-9661-4c67d340813f"

# Secrets (set via wrangler secret put)
# - STRIPE_SECRET_KEY
# - STRIPE_WEBHOOK_SECRET
