[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-backup-system.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "backup"

[services.env]
PORT = "9750"
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
