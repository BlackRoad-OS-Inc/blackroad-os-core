version: '3.8'

services:
  blackroad-server:
    build: .
    container_name: blackroad-os-pyto-server
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=production
      - PORT=8080
      - HOST=0.0.0.0
      - MAX_AGENTS=30000
      - MAX_WEBSOCKET_CONNECTIONS=100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Add Redis for distributed caching
