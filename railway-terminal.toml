[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-terminal-server.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "blackroad-terminal"

[services.env]
PORT = "8765"
PYTHONUNBUFFERED = "1"
NODE_ENV = "production"
