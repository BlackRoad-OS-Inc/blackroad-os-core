[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-terminal-server.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "terminal-server"

[services.env]
PORT = "8080"
PYTHONUNBUFFERED = "1"
