[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-console-server.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "console-server"

[services.env]
PORT = "8888"
PYTHONUNBUFFERED = "1"
