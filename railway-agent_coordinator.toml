[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-agent-coordinator.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "agent_coordinator"

[services.env]
PORT = "9950"
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
