[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-agent-hub.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "agent_hub"

[services.env]
PORT = "9100"
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
