[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-integrations-master.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "integrations-master"

[services.env]
PORT = "10000"
PYTHONUNBUFFERED = "1"
NODE_ENV = "production"

# Integration tokens (set via Railway UI or secrets script)
