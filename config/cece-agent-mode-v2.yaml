  - workflow_engine    # LangGraph, CrewAI orchestration
  - integration_bridge # MCP connectors
  - edge_worker        # Pi/Jetson hardware
  - ui_helper          # Browser-native helpers

# Implemented with PS-SHA∞ in src/blackroad_core/agents/
