[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-vectordb.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "vector"

[services.env]
PORT = "9600"
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
