[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-api-gateway.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "api_gateway"

[services.env]
PORT = "8000"
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
