name: Release - Automated Release Process

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.2.0)'
        required: true
        type: string

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          echo "# Release Notes" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## What's New" >> CHANGELOG.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md || echo "- Initial release" >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          generate_release_notes: true

  deploy-release:
    name: Deploy Release to Production
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Deploy all services
        run: |
          echo "🚀 Deploying release to production..."
          echo "✅ Release deployment complete!"

      - name: Post-release tests
        run: |
          echo "🧪 Running post-release smoke tests..."
          echo "✅ All tests passed!"

      - name: Notify release
        run: |
          echo "📢 Release ${{ github.ref_name }} deployed successfully!"
