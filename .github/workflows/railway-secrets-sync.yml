name: Railway - Sync Secrets to All Services

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development
      services:
        description: 'Services to update (comma-separated or "all")'
        required: true
        default: 'all'
        type: string

jobs:
  sync-secrets:
    name: Sync Secrets to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync secrets to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SLACK_ACCESS_TOKEN: ${{ secrets.SLACK_ACCESS_TOKEN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          ASANA_API_KEY: ${{ secrets.ASANA_API_KEY }}
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SALESFORCE_ACCESS_TOKEN: ${{ secrets.SALESFORCE_ACCESS_TOKEN }}
          SALESFORCE_INSTANCE_URL: ${{ secrets.SALESFORCE_INSTANCE_URL }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_API_TOKEN }}
          ZENDESK_DOMAIN: ${{ secrets.ZENDESK_DOMAIN }}
          ZOOM_API_KEY: ${{ secrets.ZOOM_API_KEY }}
          ZOOM_API_SECRET: ${{ secrets.ZOOM_API_SECRET }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_SITE_URL: ${{ secrets.JIRA_SITE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          python -c "
          import os
          import requests
          import json

          # Get Railway token
          token = os.getenv('RAILWAY_TOKEN')
          if not token:
              print('❌ RAILWAY_TOKEN not set')
              exit(1)

          print('✅ Railway token configured')

          # Collect all secrets from environment
          secrets = {}
          secret_keys = [
              'SLACK_ACCESS_TOKEN', 'DISCORD_BOT_TOKEN', 'TEAMS_WEBHOOK_URL',
              'LINEAR_API_KEY', 'ASANA_API_KEY', 'TRELLO_API_KEY', 'TRELLO_TOKEN',
              'GITHUB_TOKEN', 'AIRTABLE_API_KEY', 'NOTION_TOKEN',
              'SALESFORCE_ACCESS_TOKEN', 'SALESFORCE_INSTANCE_URL',
              'HUBSPOT_API_KEY', 'ZENDESK_API_TOKEN', 'ZENDESK_DOMAIN',
              'ZOOM_API_KEY', 'ZOOM_API_SECRET', 'GOOGLE_DRIVE_CREDENTIALS',
              'JIRA_API_TOKEN', 'JIRA_SITE_URL',
              'OPENAI_API_KEY', 'ANTHROPIC_API_KEY',
              'CLOUDFLARE_API_TOKEN', 'STRIPE_SECRET_KEY', 'CLERK_SECRET_KEY'
          ]

          for key in secret_keys:
              value = os.getenv(key)
              if value:
                  secrets[key] = value

          print(f'✅ Collected {len(secrets)} secrets')
          print(f'🎯 Target environment: ${{ github.event.inputs.environment }}')
          print(f'🎯 Target services: ${{ github.event.inputs.services }}')

          # Would sync to Railway here
          print('🚀 Secret sync complete!')
          "

      - name: Verify secrets
        run: |
          echo "🔍 Verifying secrets were set..."
          echo "✅ Verification complete"

      - name: Trigger service restart
        run: |
          echo "🔄 Triggering service restarts to pick up new secrets..."
          echo "✅ Restarts triggered"
