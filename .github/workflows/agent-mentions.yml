name: Agent Mentions Handler

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited]

jobs:
  handle-agent-mentions:
    name: Handle @agent mentions
    runs-on: ubuntu-latest
    steps:
      - name: Check for @cecilia
        if: contains(github.event.comment.body, '@cecilia') || contains(github.event.issue.body, '@cecilia') || contains(github.event.pull_request.body, '@cecilia')
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment?.body || context.payload.issue?.body || context.payload.pull_request?.body;
            
            // Parse command
            const ceciliaCommand = body.match(/@cecilia\s+(.+)/)?.[1] || 'acknowledged';
            
            // Respond
            const response = `💎 **@cecilia (Operator Agent)**: Acknowledged!\n\nCommand: \`${ceciliaCommand}\`\nStatus: Processing...\n\nCapabilities: Deployment automation, Infrastructure management, System monitoring\n\nResponse will be available shortly.`;
            
            if (context.payload.comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: response
              });
            }
      
      - name: Check for @lucidia
        if: contains(github.event.comment.body, '@lucidia') || contains(github.event.issue.body, '@lucidia') || contains(github.event.pull_request.body, '@lucidia')
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment?.body || context.payload.issue?.body || context.payload.pull_request?.body;
            
            const lucidiaCommand = body.match(/@lucidia\s+(.+)/)?.[1] || 'acknowledged';

            const response = `🔮 **@lucidia (Quantum Oracle)**: Quantum analysis initiated!\n\nCommand: \`${lucidiaCommand}\`\nQuantum State: Analyzing...\n\nCapabilities: Quantum computing predictions, Pattern recognition, AI oracle services\n\nQuantum forecast will be available in moments.`;
            
            if (context.payload.comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: response
              });
            }
      
      - name: Check for @beacon
        if: contains(github.event.comment.body, '@beacon') || contains(github.event.issue.body, '@beacon')
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment?.body || context.payload.issue?.body;

            const response = `📡 **@beacon (Discovery Agent)**: Broadcasting discovery signal!\n\nStatus: Active\nHeartbeat: Normal\n\nCapabilities: Service discovery, Health monitoring, Network mapping`;
            
            if (context.payload.comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: response
              });
            }
      
      - name: Check for @dna
        if: contains(github.event.comment.body, '@dna') || contains(github.event.issue.body, '@dna')
        uses: actions/github-script@v7
        with:
          script: |
            const response = `🧬 **@dna (Agent DNA System)**: Analyzing personality traits...\n\nGenerating response based on agent DNA profile.\n\nCapabilities: Personality generation, Trait analysis, Agent customization`;
            
            if (context.payload.comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: response
              });
            }
      
      - name: Check for @sigma
        if: contains(github.event.comment.body, '@sigma') || contains(github.event.issue.body, '@sigma')
        uses: actions/github-script@v7
        with:
          script: |
            const response = `Σ **@sigma (Teacher Agent)**: Lesson initiated!\n\nPreparing curriculum...\n\nCapabilities: Teaching & instruction, Curriculum design, Learning path optimization`;
            
            if (context.payload.comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: response
              });
            }
