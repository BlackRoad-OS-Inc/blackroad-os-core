name: lint 🧹

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main, dev, staging]

permissions:
  contents: read

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run ESLint
        run: pnpm lint

      - name: Check Prettier formatting
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,md}"
        continue-on-error: true
name: Lint

on:
  pull_request:
    branches: [main, develop, staging]
  push:
    branches: [main, develop]

jobs:
  lint:
    name: Run Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Type Check
        run: npm run type-check

      - name: Lint Summary
        if: always()
        run: |
          echo "### Lint Results 🔍" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ $? -eq 0 ]; then
            echo "✅ No lint errors" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Lint errors found" >> $GITHUB_STEP_SUMMARY
          fi
