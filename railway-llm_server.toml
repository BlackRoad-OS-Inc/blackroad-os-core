[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-llm-server.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "llm_server"

[services.env]
PORT = "9300"
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
