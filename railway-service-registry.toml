[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-service-registry.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "service-registry"

[services.env]
PORT = "9900"
PYTHONUNBUFFERED = "1"
