<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRoad API Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 300px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            overflow-y: auto;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            padding: 15px 20px;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #FF9D00;
        }
        .header p {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        .endpoint-list {
            padding: 20px;
        }
        .endpoint-group {
            margin-bottom: 30px;
        }
        .endpoint-group-title {
            font-size: 0.9rem;
            color: #FF9D00;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .endpoint-item {
            background: #2d2d30;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .endpoint-item:hover {
            background: #3e3e42;
            border-color: #FF9D00;
        }
        .endpoint-item.active {
            background: #3e3e42;
            border-color: #FF9D00;
        }
        .method {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-right: 8px;
        }
        .method-get { background: #4CAF50; color: #fff; }
        .method-post { background: #2196F3; color: #fff; }
        .method-put { background: #FF9800; color: #fff; }
        .method-delete { background: #F44336; color: #fff; }
        .endpoint-path {
            font-size: 0.85rem;
        }
        .content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .request-section {
            background: #252526;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #3e3e42;
        }
        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #FF9D00;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            color: #d4d4d4;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        button {
            background: linear-gradient(135deg, #FF9D00 0%, #FF6B00 100%);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 1rem;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .response-section {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #3e3e42;
        }
        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .status-200 { background: #4CAF50; color: #fff; }
        .status-400 { background: #FF9800; color: #fff; }
        .status-500 { background: #F44336; color: #fff; }
        .response-body {
            background: #000;
            border-radius: 6px;
            padding: 15px;
            overflow-x: auto;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #FF9D00;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #3e3e42;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab:hover {
            background: rgba(255,157,0,0.1);
        }
        .tab.active {
            border-bottom-color: #FF9D00;
            color: #FF9D00;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="endpoint-list">
            <div class="endpoint-group">
                <div class="endpoint-group-title">Core Endpoints</div>
                <div class="endpoint-item active" data-method="GET" data-path="/" data-desc="API root information">
                    <span class="method method-get">GET</span>
                    <span class="endpoint-path">/</span>
                </div>
                <div class="endpoint-item" data-method="GET" data-path="/health" data-desc="Health check endpoint">
                    <span class="method method-get">GET</span>
                    <span class="endpoint-path">/health</span>
                </div>
            </div>

            <div class="endpoint-group">
                <div class="endpoint-group-title">Agent Management</div>
                <div class="endpoint-item" data-method="GET" data-path="/agents" data-desc="List all active agents">
                    <span class="method method-get">GET</span>
                    <span class="endpoint-path">/agents</span>
                </div>
                <div class="endpoint-item" data-method="POST" data-path="/agents/spawn" data-desc="Spawn a new agent" data-body='{"role":"Financial Analyst","pack":"pack-finance","capabilities":["analyze_data"]}'>
                    <span class="method method-post">POST</span>
                    <span class="endpoint-path">/agents/spawn</span>
                </div>
            </div>

            <div class="endpoint-group">
                <div class="endpoint-group-title">Services</div>
                <div class="endpoint-item" data-method="GET" data-path="/quantum" data-desc="Quantum API status">
                    <span class="method method-get">GET</span>
                    <span class="endpoint-path">/quantum</span>
                </div>
                <div class="endpoint-item" data-method="GET" data-path="/lucidia" data-desc="Lucidia breath engine state">
                    <span class="method method-get">GET</span>
                    <span class="endpoint-path">/lucidia</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h1>API Explorer</h1>
            <p>Interactive testing for BlackRoad API Gateway</p>
        </div>

        <div class="content">
            <div class="request-section">
                <div class="section-title">Request</div>

                <div class="input-group">
                    <label>Method</label>
                    <select id="method">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="DELETE">DELETE</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Endpoint URL</label>
                    <input type="text" id="url" value="https://basket-aus-brass-dog.trycloudflare.com/">
                </div>

                <div class="tabs">
                    <div class="tab active" data-tab="body">Body</div>
                    <div class="tab" data-tab="headers">Headers</div>
                </div>

                <div id="tab-body" class="tab-content">
                    <div class="input-group">
                        <textarea id="body" placeholder='{"key": "value"}'></textarea>
                    </div>
                </div>

                <div id="tab-headers" class="tab-content" style="display: none;">
                    <div class="input-group">
                        <textarea id="headers" placeholder='{"Content-Type": "application/json"}'>{"Content-Type": "application/json"}</textarea>
                    </div>
                </div>

                <button id="send-btn">
                    <span id="send-text">Send Request</span>
                    <span id="send-loader" class="loading" style="display: none;"></span>
                </button>
            </div>

            <div class="response-section">
                <div class="response-header">
                    <div class="section-title">Response</div>
                    <div id="status-badge"></div>
                </div>
                <div class="response-body">
                    <pre id="response">Click "Send Request" to test an endpoint</pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://basket-aus-brass-dog.trycloudflare.com';

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                document.getElementById(`tab-${tab.dataset.tab}`).style.display = 'block';
            });
        });

        // Endpoint selection
        document.querySelectorAll('.endpoint-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.endpoint-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');

                const method = item.dataset.method;
                const path = item.dataset.path;
                const body = item.dataset.body || '';

                document.getElementById('method').value = method;
                document.getElementById('url').value = BASE_URL + path;
                document.getElementById('body').value = body;
            });
        });

        // Send request
        document.getElementById('send-btn').addEventListener('click', async () => {
            const btn = document.getElementById('send-btn');
            const text = document.getElementById('send-text');
            const loader = document.getElementById('send-loader');
            const statusBadge = document.getElementById('status-badge');
            const responseEl = document.getElementById('response');

            btn.disabled = true;
            text.style.display = 'none';
            loader.style.display = 'inline-block';

            try {
                const method = document.getElementById('method').value;
                const url = document.getElementById('url').value;
                const bodyText = document.getElementById('body').value;
                const headersText = document.getElementById('headers').value;

                const options = { method };

                if (headersText) {
                    try {
                        options.headers = JSON.parse(headersText);
                    } catch (e) {
                        throw new Error('Invalid headers JSON');
                    }
                }

                if (bodyText && (method === 'POST' || method === 'PUT')) {
                    options.body = bodyText;
                }

                const start = Date.now();
                const response = await fetch(url, options);
                const elapsed = Date.now() - start;

                const contentType = response.headers.get('content-type');
                let data;
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    data = await response.text();
                }

                // Update status badge
                const statusClass = response.ok ? 'status-200' : (response.status >= 500 ? 'status-500' : 'status-400');
                statusBadge.className = `status-badge ${statusClass}`;
                statusBadge.textContent = `${response.status} ${response.statusText} • ${elapsed}ms`;

                // Update response
                if (typeof data === 'object') {
                    responseEl.textContent = JSON.stringify(data, null, 2);
                } else {
                    responseEl.textContent = data;
                }
            } catch (err) {
                statusBadge.className = 'status-badge status-500';
                statusBadge.textContent = 'Error';
                responseEl.textContent = `Error: ${err.message}`;
            } finally {
                btn.disabled = false;
                text.style.display = 'inline';
                loader.style.display = 'none';
            }
        });

        // Auto-load first endpoint
        setTimeout(() => {
            document.getElementById('send-btn').click();
        }, 500);
    </script>
</body>
</html>
