<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get BlackRoad OS - Start Now</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #000 0%, #1a0033 50%, #000 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      max-width: 600px;
      text-align: center;
      padding: 40px 20px;
      animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 900;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #FF9D00, #FF0066, #7700FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.5rem;
      margin-bottom: 40px;
      color: rgba(255, 255, 255, 0.8);
    }

    .features {
      display: grid;
      gap: 15px;
      margin: 40px 0;
      text-align: left;
    }

    .feature {
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border-left: 4px solid #FF0066;
      font-size: 1.1rem;
    }

    .cta-button {
      display: inline-block;
      padding: 20px 60px;
      background: linear-gradient(135deg, #FF0066, #7700FF);
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 10px 40px rgba(255, 0, 102, 0.4);
      margin-top: 30px;
    }

    .cta-button:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 60px rgba(255, 0, 102, 0.6);
    }

    .price {
      font-size: 2.5rem;
      font-weight: 900;
      margin: 30px 0 10px;
    }

    .price span {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .guarantee {
      margin-top: 30px;
      padding: 20px;
      background: rgba(0, 255, 136, 0.1);
      border-radius: 12px;
      border: 2px solid #00FF88;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 BlackRoad OS</h1>
    <div class="subtitle">30,000 AI Agents. Infinite Automation.</div>

    <div class="features">
      <div class="feature">✅ 100+ Pre-Built AI Agents</div>
      <div class="feature">⚡ 27 LLM Models Integrated</div>
      <div class="feature">💰 Stripe Monetization Built-In</div>
      <div class="feature">🔧 Full API Access</div>
      <div class="feature">📊 Real-Time Analytics</div>
      <div class="feature">🌐 Deploy Anywhere</div>
    </div>

    <div class="price">
      Starting at $29<span>/month</span>
    </div>

    <a href="https://pay.blackroad.io" class="cta-button">
      Get Started Now →
    </a>

    <div class="guarantee">
      💎 30-Day Money-Back Guarantee<br>
      🔒 Secure Payment via Stripe
    </div>
  </div>
</body>
</html>
