<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackRoad OS - Pricing & Plans</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header {
      text-align: center;
      color: white;
      margin: 40px 0;
    }

    .header h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .pricing-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin: 30px 0;
    }

    .toggle-switch {
      position: relative;
      width: 60px;
      height: 30px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .toggle-switch.active {
      background: rgba(255, 255, 255, 0.5);
    }

    .toggle-slider {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 50%;
      transition: all 0.3s;
    }

    .toggle-switch.active .toggle-slider {
      left: 33px;
    }

    .toggle-label {
      color: white;
      font-weight: 600;
      font-size: 1rem;
    }

    .pricing-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
      max-width: 1200px;
      width: 100%;
      margin: 40px 0;
    }

    .pricing-card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .pricing-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
    }

    .pricing-card.popular {
      border: 3px solid #667eea;
    }

    .popular-badge {
      position: absolute;
      top: -15px;
      right: 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .tier-name {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 10px;
    }

    .tier-price {
      font-size: 3rem;
      font-weight: 900;
      color: #667eea;
      margin: 20px 0;
    }

    .tier-price span {
      font-size: 1.2rem;
      color: #666;
      font-weight: 400;
    }

    .tier-features {
      list-style: none;
      margin: 30px 0;
    }

    .tier-features li {
      padding: 12px 0;
      color: #555;
      font-size: 1rem;
      border-bottom: 1px solid #eee;
      position: relative;
      padding-left: 30px;
    }

    .tier-features li:before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #667eea;
      font-weight: 900;
      font-size: 1.2rem;
    }

    .cta-button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 30px;
    }

    .cta-button.primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .cta-button.secondary {
      background: #f0f0f0;
      color: #1a1a1a;
    }

    .cta-button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .loading {
      display: none;
      text-align: center;
      color: white;
      font-size: 1.2rem;
      margin: 20px 0;
    }

    .loading.active {
      display: block;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 2rem;
      }

      .pricing-cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚀 BlackRoad OS</h1>
    <p>30,000 AI Agents. Infinite Possibilities.</p>
  </div>

  <div class="pricing-toggle">
    <span class="toggle-label">Monthly</span>
    <div class="toggle-switch" id="billingToggle">
      <div class="toggle-slider"></div>
    </div>
    <span class="toggle-label">Yearly (Save 17%)</span>
  </div>

  <div class="pricing-cards" id="pricingCards">
    <!-- Pricing cards will be loaded here -->
  </div>

  <div class="loading" id="loading">Processing payment...</div>

  <script>
    const API_URL = 'https://pay.blackroad.io';
    let billingPeriod = 'monthly';
    let pricingTiers = [];

    // Load pricing tiers
    async function loadPricing() {
      try {
        const response = await fetch(`${API_URL}/pricing`);
        pricingTiers = await response.json();
        renderPricingCards();
      } catch (error) {
        console.error('Failed to load pricing:', error);
      }
    }

    // Render pricing cards
    function renderPricingCards() {
      const container = document.getElementById('pricingCards');
      container.innerHTML = pricingTiers.map((tier, index) => {
        const price = billingPeriod === 'yearly' ? tier.priceYearly : tier.priceMonthly;
        const isPopular = index === 1; // Pro tier is popular

        return `
          <div class="pricing-card ${isPopular ? 'popular' : ''}">
            ${isPopular ? '<div class="popular-badge">MOST POPULAR</div>' : ''}
            <div class="tier-name">${tier.name}</div>
            <div class="tier-price">
              $${price}
              <span>/${billingPeriod === 'yearly' ? 'year' : 'month'}</span>
            </div>
            <ul class="tier-features">
              ${tier.features.map(feature => `<li>${feature}</li>`).join('')}
            </ul>
            <button
              class="cta-button ${isPopular ? 'primary' : 'secondary'}"
              onclick="handlePurchase('${tier.id}', '${billingPeriod}')"
            >
              Get Started
            </button>
          </div>
        `;
      }).join('');
    }

    // Handle billing toggle
    document.getElementById('billingToggle').addEventListener('click', function() {
      this.classList.toggle('active');
      billingPeriod = this.classList.contains('active') ? 'yearly' : 'monthly';
      renderPricingCards();
    });

    // Handle purchase
    async function handlePurchase(tierId, billing) {
      const loading = document.getElementById('loading');
      loading.classList.add('active');

      try {
        // Generate a user ID (in production, this would come from auth)
        const userId = 'user_' + Math.random().toString(36).substring(7);
        const email = prompt('Enter your email address:');

        if (!email) {
          loading.classList.remove('active');
          return;
        }

        const response = await fetch(`${API_URL}/create-checkout-session`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            tierId,
            billingPeriod: billing,
            userId,
            email
          })
        });

        const { url } = await response.json();

        // Redirect to Stripe Checkout
        window.location.href = url;
      } catch (error) {
        console.error('Payment failed:', error);
        alert('Payment failed. Please try again.');
        loading.classList.remove('active');
      }
    }

    // Initialize
    loadPricing();
  </script>
</body>
</html>
