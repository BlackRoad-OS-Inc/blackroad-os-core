[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-agent-orchestrator-v2.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "agent-orchestrator"

[services.env]
PORT = "10100"
PYTHONUNBUFFERED = "1"
