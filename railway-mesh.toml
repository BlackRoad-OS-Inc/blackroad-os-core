[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad-service-mesh.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "mesh"

[services.env]
PORT = "9500"
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
